<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>いびき - 睡眠サウンドレポート</title>
<style>
  :root{--bg:#070A14;--card:#141C34;--border:#26314F;--text:#EAF0FF;--dim:#9FB0D0;--accent:#8FB5FF;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:linear-gradient(180deg,#04060F,#0C1226 50%,#1A1F52);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{max-width:560px;width:100%;background:rgba(150,170,225,.07);border:1px solid var(--border);
    border-radius:22px;padding:40px 34px;backdrop-filter:blur(4px);}
  h1{font-size:26px;font-weight:800;letter-spacing:.5px;}
  .tag{color:var(--accent);font-size:13px;margin-top:8px;letter-spacing:1px;}
  p{color:var(--dim);font-size:14px;line-height:1.9;margin-top:18px;}
  .links{margin-top:28px;display:flex;flex-direction:column;gap:10px;}
  .links a{display:block;padding:14px 18px;border:1px solid var(--border);border-radius:14px;
    color:var(--text);text-decoration:none;font-size:14px;font-weight:600;}
  .links a:hover{border-color:var(--accent);}
  .foot{color:#5E6C8E;font-size:11px;margin-top:26px;}
</style>
</head>
<body>
  <div class="card">
    <h1>いびき</h1>
    <div class="tag">睡眠サウンドレポート</div>
    <p>就寝中の音をこの端末の中だけで記録・分析し、朝の睡眠サウンドレポートをお届けする iOS アプリです。録音はクラウドに送信されません。</p>
    <div class="links">
      <a href="/privacy">プライバシーポリシー</a>
      <a href="/terms">利用規約</a>
      <a href="/support">サポート</a>
    </div>
    <div class="foot">© 2026 Masataka Fujimoto</div>
  </div>
</body>
</html>
